name: Bug report
description: Report something that isn't working as expected
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributions: []
    value: |
      Thanks for taking the time to report a bug. Please fill in as much detail as you can — it helps us fix issues faster.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: ctx list fails with a validation error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: ctx list should show my Codex threads...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Commands and steps to trigger the issue.
      placeholder: |
        1. Run `ctx setup`
        2. Run `ctx list`
        3. See error
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Exact command
      placeholder: ctx migrate abc123 --from=codex --to=cursor
    validations:
      required: false

  - type: textarea
    id: output
    attributes:
      label: Error output / logs
      description: Paste the full terminal output or error message.
      render: shell
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: input
    id: bun-version
    attributes:
      label: Bun version
      description: Output of `bun --version`
      placeholder: 1.3.13
    validations:
      required: false

  - type: input
    id: codex-path
    attributes:
      label: Codex executable path (if relevant)
      description: From config or `CODEX_CLI_PATH`
      placeholder: C:\Users\...\codex.exe
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this one
          required: true
        - label: I am running the latest version from `main`
          required: false
